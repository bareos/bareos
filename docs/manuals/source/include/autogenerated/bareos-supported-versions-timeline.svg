<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="601" viewBox="0 0 1120 601">
  <defs>
    <style type="text/css"><![CDATA[
      .bg { fill: #ffffff; }
      .title { fill: #123047; font: 700 24px sans-serif; }
      .tick text { fill: #7b8d9b; font: 14px sans-serif; text-anchor: middle; }
      .row-label { fill: #4b5d6b; font: 16px sans-serif; text-anchor: end; dominant-baseline: middle; }
      .grid { stroke: #dde6eb; stroke-width: 1; }
      .axis { stroke: #96a9b5; stroke-width: 1.2; }
      .development { fill: #e39a3b; }
      .supported { fill: #1f8acb; }
      .current { fill: #4f9f46; }
      .unsupported { fill: #bcc7cf; }
      .projected-supported { fill: #8cc8eb; stroke: #1f8acb; stroke-width: 1.2; stroke-dasharray: 5 4; }
      .projected-current { fill: #9fd18b; stroke: #4f9f46; stroke-width: 1.2; stroke-dasharray: 5 4; }
      .label { fill: #ffffff; font: 600 15px sans-serif; dominant-baseline: middle; }
      .small-label { fill: #334854; font: 13px sans-serif; dominant-baseline: middle; }
      .note { fill: #5c7285; font: 13px sans-serif; }
      .today { stroke: #123047; stroke-width: 2; stroke-dasharray: 6 4; }
      .today-text { fill: #123047; font: 600 13px sans-serif; text-anchor: end; }
    ]]></style>
  </defs>

  <rect class="bg" x="0" y="0" width="1120" height="601"/>
  <text class="title" x="40" y="36">Bareos supported versions over time</text>
  <g transform="translate(220,90)">
    <g class="tick">
      <line class="grid" x1="13.3" y1="0" x2="13.3" y2="360" stroke-dasharray="3 3"/>
      <text x="13.3" y="-12">Jul 2023</text>
      <line class="grid" x1="82.9" y1="0" x2="82.9" y2="360"/>
      <text x="82.9" y="-12">Jan 2024</text>
      <line class="grid" x1="151.8" y1="0" x2="151.8" y2="360" stroke-dasharray="3 3"/>
      <text x="151.8" y="-12">Jul 2024</text>
      <line class="grid" x1="221.5" y1="0" x2="221.5" y2="360"/>
      <text x="221.5" y="-12">Jan 2025</text>
      <line class="grid" x1="290.0" y1="0" x2="290.0" y2="360" stroke-dasharray="3 3"/>
      <text x="290.0" y="-12">Jul 2025</text>
      <line class="grid" x1="359.7" y1="0" x2="359.7" y2="360"/>
      <text x="359.7" y="-12">Jan 2026</text>
      <line class="grid" x1="428.3" y1="0" x2="428.3" y2="360" stroke-dasharray="3 3"/>
      <text x="428.3" y="-12">Jul 2026</text>
      <line class="grid" x1="497.9" y1="0" x2="497.9" y2="360"/>
      <text x="497.9" y="-12">Jan 2027</text>
      <line class="grid" x1="566.5" y1="0" x2="566.5" y2="360" stroke-dasharray="3 3"/>
      <text x="566.5" y="-12">Jul 2027</text>
      <line class="grid" x1="636.1" y1="0" x2="636.1" y2="360"/>
      <text x="636.1" y="-12">Jan 2028</text>
      <line class="grid" x1="705.0" y1="0" x2="705.0" y2="360" stroke-dasharray="3 3"/>
      <text x="705.0" y="-12">Jul 2028</text>
      <line class="grid" x1="774.7" y1="0" x2="774.7" y2="360"/>
      <text x="774.7" y="-12">Jan 2029</text>
    </g>

    <line class="today" x1="415.0" y1="0" x2="415.0" y2="360"/>
    <text class="today-text" x="409.0" y="377">Today · 2026-05-27</text>

    <line class="axis" x1="0" y1="360" x2="830" y2="360"/>

    <g>
      <line class="grid" x1="0" y1="24" x2="830" y2="24"/>
      <text class="row-label" x="-14" y="41.0">master</text>
      <rect class="development" x="0" y="24" width="830" height="34" rx="4"/>
      <text class="label" x="14" y="41.0">development</text>
    </g>

    <g>
      <line class="grid" x1="0" y1="80" x2="830" y2="80"/>
      <text class="row-label" x="-14" y="97.0">Bareos 22</text>
      <rect class="current" x="0.0" y="80" width="75.7" height="34" rx="4"/>
      <text class="label" x="14.0" y="97.0">current</text>
      <rect class="supported" x="75.7" y="80" width="272.3" height="34" rx="4"/>
      <text class="label" x="89.7" y="97.0">supported</text>
      <rect class="unsupported" x="348.0" y="80" width="482.0" height="34" rx="4"/>
      <text class="small-label" x="362.0" y="97.0">unsupported</text>
    </g>

    <g>
      <line class="grid" x1="0" y1="136" x2="830" y2="136"/>
      <text class="row-label" x="-14" y="153.0">Bareos 23</text>
      <rect class="current" x="75.7" y="136" width="139.8" height="34" rx="4"/>
      <text class="label" x="89.7" y="153.0">current</text>
      <rect class="supported" x="215.5" y="136" width="270.7" height="34" rx="4"/>
      <text class="label" x="229.5" y="153.0">supported</text>
      <rect class="unsupported" x="486.2" y="136" width="343.8" height="34" rx="4"/>
      <text class="small-label" x="500.2" y="153.0">unsupported</text>
    </g>

    <g>
      <line class="grid" x1="0" y1="192" x2="830" y2="192"/>
      <text class="row-label" x="-14" y="209.0">Bareos 24</text>
      <rect class="current" x="215.5" y="192" width="132.5" height="34" rx="4"/>
      <text class="label" x="229.5" y="209.0">current</text>
      <rect class="supported" x="348.0" y="192" width="276.4" height="34" rx="4"/>
      <text class="label" x="362.0" y="209.0">supported</text>
      <rect class="unsupported" x="624.4" y="192" width="205.60000000000002" height="34" rx="4"/>
      <text class="small-label" x="638.4" y="209.0">unsupported</text>
    </g>

    <g>
      <line class="grid" x1="0" y1="248" x2="830" y2="248"/>
      <text class="row-label" x="-14" y="265.0">Bareos 25</text>
      <rect class="current" x="348.0" y="248" width="138.2" height="34" rx="4"/>
      <text class="label" x="362.0" y="265.0">current</text>
      <rect class="supported" x="486.2" y="248" width="276.40000000000003" height="34" rx="4"/>
      <text class="label" x="500.2" y="265.0">supported</text>
      <rect class="unsupported" x="762.6" y="248" width="67.39999999999998" height="34" rx="4"/>
    </g>

    <g>
      <line class="grid" x1="0" y1="304" x2="830" y2="304"/>
      <text class="row-label" x="-14" y="321.0">Bareos 26</text>
      <rect class="projected-current" x="486.2" y="304" width="138.2" height="34" rx="4"/>
      <text class="small-label" x="500.2" y="321.0">current</text>
      <rect class="projected-supported" x="624.4" y="304" width="205.60000000000002" height="34" rx="4"/>
      <text class="small-label" x="638.4" y="321.0">supported</text>
    </g>

  </g>

  <g transform="translate(40,486)">
    <rect class="development" x="0" y="0" width="18" height="18" rx="3"/>
    <text class="note" x="26" y="14">development branch</text>
    <rect class="supported" x="170" y="0" width="18" height="18" rx="3"/>
    <text class="note" x="196" y="14">supported major release</text>
    <rect class="current" x="405" y="0" width="18" height="18" rx="3"/>
    <text class="note" x="431" y="14">newest supported major</text>
    <rect class="projected-supported" x="662" y="0" width="18" height="18" rx="3"/>
    <text class="note" x="688" y="14">future state</text>
  </g>

  <text class="note" x="40" y="531">
    Actual release starts from GitHub releases: 22.0.0 (2022-12-21), 23.0.0 (2023-12-13), 24.0.0 (2024-12-16), 25.0.0 (2025-12-01).
  </text>
  <text class="note" x="40" y="553">
    Future versions are projections based on the configured major-release interval.
  </text>
</svg>
