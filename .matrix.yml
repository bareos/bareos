OS:
  Sanitize:
    "F44":
      TYPE: scripted
      IMAGE: fedora44
      BUILD_SCRIPT: bareos/devtools/build-and-test-with-sanitize.sh
      FINISH_SCRIPT: CD/sanitize/finish-sanitize.sh
      ARCH:
        - x86_64
  xUbuntu:
    "26.04":
      TYPE: deb
      IMAGE: "ubuntu26.04"
      ARCH:
        - x86_64
  SUSE:
    "16":
      TYPE: rpm
      IMAGE: sle160
      CUSTOM_TEST_IMAGES: [ SLE-16.0, openSUSE-Leap_16.0 ]
      ARCH:
      - x86_64
  Fedora:
    "44":
      TYPE: rpm
      IMAGE: fedora44
      ARCH:
      - x86_64
  Debian:
    "13":
      TYPE: deb
      IMAGE: "debian13"
      ARCH:
        - x86_64
  EL:
    "10":
      TYPE: rpm
      IMAGE: rhel10
      CUSTOM_TEST_IMAGES: [ RHEL ]
      ARCH:
        - x86_64
    "9":
      TYPE: rpm
      IMAGE: rhel9
      CUSTOM_TEST_IMAGES: [ Stream, RHEL ]
      ARCH:
        - x86_64
  FreeBSD:
    "14":
      TYPE: freebsd
      ARCH:
        - amd64
  MacOS:
    "15":
      TYPE: macos
      ARCH:
        - x64
  win:
    native:
      TYPE: win-native
      BUILD_SCRIPT: CD/windows/build-ninja.bat
      STAGES:
        - win-native-64-release
      ARCH:
       - x86_64
      WINVERSIONS:
         - windows-11-64
